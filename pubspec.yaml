name: tera_assistente
description: "TERA - Assistente pessoal de servicos para Android"
publish_to: 'none'
version: 1.2.2+4

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  crypto: ^3.0.6
  google_fonts: ^6.3.2
  intl: ^0.20.2
  http: ^1.6.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/icons/app_icon.png

flutter_launcher_icons:
  android: true
  image_path: assets/icons/app_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#05060A"
  adaptive_icon_foreground: assets/icons/app_icon.png
  adaptive_icon_monochrome: assets/icons/app_icon.png
